<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>玄灵命理 · 今日运势与黄历择日</title>
  <style>
    :root {
      --bg1: #0d1321;
      --bg2: #17213a;
      --card: rgba(255,255,255,.085);
      --card2: rgba(255,255,255,.13);
      --text: #f7f2e8;
      --muted: #c8c1b2;
      --gold: #d9b56f;
      --pink: #b9895a;
      --cyan: #8ec5c0;
      --danger: #ff8f8f;
      --ok: #8cffc1;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    }

    * { box-sizing: border-box; }
    html { -webkit-text-size-adjust: 100%; }
    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      background:
        radial-gradient(circle at 18% 12%, rgba(217,181,111,.22), transparent 28%),
        radial-gradient(circle at 86% 8%, rgba(142,197,192,.18), transparent 31%),
        radial-gradient(circle at 50% 100%, rgba(185,137,90,.16), transparent 38%),
        linear-gradient(135deg, var(--bg1), var(--bg2) 62%, #101827);
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
      touch-action: manipulation;
    }

    .stars, .stars::before, .stars::after {
      position: fixed;
      inset: 0;
      pointer-events: none;
      content: "";
      background-image:
        radial-gradient(rgba(255,255,255,.62) 1px, transparent 1.4px),
        radial-gradient(rgba(217,181,111,.38) 1px, transparent 1.2px);
      background-size: 90px 90px, 140px 140px;
      background-position: 0 0, 40px 60px;
      animation: drift 28s linear infinite;
      opacity: .55;
    }
    .stars::before { animation-duration: 45s; opacity: .35; transform: scale(1.4); }
    .stars::after { animation-duration: 70s; opacity: .25; transform: scale(2); }
    @keyframes drift { from { transform: translateY(0); } to { transform: translateY(-90px); } }

    main {
      width: min(980px, calc(100% - 32px));
      margin: 0 auto;
      padding: max(42px, env(safe-area-inset-top)) 0 max(54px, env(safe-area-inset-bottom));
      position: relative;
      z-index: 1;
    }

    .hero { text-align: center; margin-bottom: 28px; }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 14px;
      border: 1px solid rgba(255,255,255,.22);
      border-radius: 999px;
      background: linear-gradient(135deg, rgba(255,255,255,.12), rgba(255,255,255,.06));
      color: var(--muted);
      backdrop-filter: blur(12px);
      font-size: 14px;
    }
    h1 {
      margin: 18px 0 8px;
      font-size: clamp(34px, 7vw, 72px);
      line-height: 1;
      letter-spacing: -2px;
      text-shadow: 0 0 28px rgba(217,181,111,.18);
    }
    .subtitle { margin: 0 auto; color: var(--muted); max-width: 680px; line-height: 1.8; }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1.1fr;
      gap: 20px;
      align-items: start;
    }

    .panel {
      border: 1px solid rgba(255,255,255,.18);
      border-radius: 24px;
      background: linear-gradient(180deg, var(--card2), var(--card));
      box-shadow: 0 22px 70px rgba(0,0,0,.34), inset 0 1px 0 rgba(255,255,255,.1);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      padding: 22px;
    }

    label { display: block; margin: 14px 0 8px; color: #f6e9ff; font-weight: 700; }
    input, select {
      width: 100%;
      min-height: 50px;
      appearance: none;
      -webkit-appearance: none;
      border: 1px solid rgba(255,255,255,.2);
      border-radius: 16px;
      padding: 14px 15px;
      color: var(--text);
      background: rgba(10, 6, 20, .45);
      outline: none;
      font-size: 16px;
    }
    input:focus, select:focus { border-color: var(--cyan); box-shadow: 0 0 0 4px rgba(130,247,255,.12); }
    select {
      background-image: linear-gradient(45deg, transparent 50%, var(--gold) 50%), linear-gradient(135deg, var(--gold) 50%, transparent 50%);
      background-position: calc(100% - 22px) 22px, calc(100% - 16px) 22px;
      background-size: 6px 6px, 6px 6px;
      background-repeat: no-repeat;
      padding-right: 40px;
    }
    input[type="date"]::-webkit-date-and-time-value { text-align: left; }
    option { color: #25103a; }

    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    button {
      width: 100%;
      margin-top: 18px;
      border: 0;
      border-radius: 18px;
      padding: 16px 18px;
      min-height: 54px;
      cursor: pointer;
      color: #271000;
      font-size: 17px;
      font-weight: 900;
      letter-spacing: .5px;
      background: linear-gradient(135deg, #f1d492, #d7a760 52%, #a9774a);
      box-shadow: 0 14px 34px rgba(160,112,58,.3);
      transition: transform .16s ease, box-shadow .16s ease;
    }
    button:hover { transform: translateY(-2px); box-shadow: 0 18px 42px rgba(255,157,66,.38); }
    button:active { transform: translateY(0); }

    .hint { color: var(--muted); font-size: 13px; line-height: 1.7; margin: 14px 0 0; }

    .crystal {
      width: 156px;
      aspect-ratio: 1;
      margin: 2px auto 18px;
      border-radius: 28px;
      background:
        linear-gradient(135deg, rgba(217,181,111,.22), rgba(142,197,192,.12)),
        radial-gradient(circle at 50% 46%, rgba(255,255,255,.12), transparent 34%),
        rgba(7,12,22,.42);
      border: 1px solid rgba(217,181,111,.28);
      box-shadow: 0 18px 45px rgba(0,0,0,.26), inset 0 0 34px rgba(255,255,255,.08);
      position: relative;
      animation: pulse 4.8s ease-in-out infinite;
    }
    .crystal::after {
      content: "卦";
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      font-size: 58px;
      font-family: Georgia, "Times New Roman", serif;
      color: rgba(241,212,146,.92);
      text-shadow: 0 0 22px rgba(217,181,111,.24);
    }
    @keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.035); } }

    .result.hidden { display: none; }
    .result h2 { margin: 4px 0 12px; font-size: 28px; }
    .pillbox { display: flex; flex-wrap: wrap; gap: 8px; margin: 12px 0 16px; }
    .pill {
      padding: 7px 10px;
      border-radius: 999px;
      background: rgba(255,255,255,.12);
      border: 1px solid rgba(255,255,255,.15);
      color: #f9eaff;
      font-size: 13px;
    }

    .score-list { display: grid; gap: 10px; margin: 18px 0; }
    .score { display: grid; grid-template-columns: 72px 1fr 42px; gap: 10px; align-items: center; color: var(--muted); font-size: 14px; }
    .bar { height: 10px; border-radius: 999px; overflow: hidden; background: rgba(255,255,255,.14); }
    .bar span { display: block; height: 100%; border-radius: inherit; background: linear-gradient(90deg, var(--cyan), var(--gold), var(--pink)); width: 0; transition: width .7s ease; }

    .fortune-card {
      margin-top: 14px;
      padding: 16px;
      border-radius: 20px;
      background: linear-gradient(180deg, rgba(0,0,0,.2), rgba(255,255,255,.055));
      border: 1px solid rgba(255,255,255,.12);
      line-height: 1.85;
      color: #fff7ff;
    }
    .fortune-card strong { color: var(--gold); }
    .small-title { color: var(--gold); font-weight: 900; margin-bottom: 6px; letter-spacing: .4px; }

    .mystic-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin-top: 12px;
    }
    .mystic-cell {
      padding: 12px 10px;
      border-radius: 16px;
      background: rgba(255,255,255,.1);
      border: 1px solid rgba(255,255,255,.14);
      text-align: center;
    }
    .mystic-cell .label { color: var(--muted); font-size: 12px; margin-bottom: 5px; }
    .mystic-cell .pillar { color: var(--gold); font-size: 20px; font-weight: 900; letter-spacing: 1px; }
    .element-list { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; }
    .element-tag {
      padding: 7px 10px;
      border-radius: 999px;
      background: rgba(130,247,255,.1);
      border: 1px solid rgba(130,247,255,.18);
      color: #eaffff;
      font-size: 13px;
    }
    .almanac-list { display: grid; gap: 9px; margin-top: 10px; }
    .almanac-row {
      display: grid;
      grid-template-columns: 56px 1fr;
      gap: 10px;
      align-items: start;
      padding: 9px 10px;
      border-radius: 14px;
      background: rgba(255,255,255,.08);
      border: 1px solid rgba(255,255,255,.1);
    }
    .almanac-row b { color: var(--gold); }
    .almanac-row span { color: #fff7ff; }

    .empty {
      min-height: 420px;
      display: grid;
      place-items: center;
      text-align: center;
      color: var(--muted);
    }
    .empty .big { font-size: 58px; display: block; margin-bottom: 12px; }

    footer { text-align: center; color: rgba(255,255,255,.45); margin-top: 22px; font-size: 12px; }

    @media (max-width: 820px) {
      main { width: min(100% - 24px, 520px); padding-top: max(24px, env(safe-area-inset-top)); }
      .grid { grid-template-columns: 1fr; gap: 16px; }
      .row { grid-template-columns: 1fr; }
      .panel { border-radius: 24px; padding: 18px; }
      .empty { min-height: 260px; }
      .crystal { width: 136px; }
      h1 { letter-spacing: -1px; }
      .subtitle { font-size: 14px; line-height: 1.7; }
      .mystic-grid { grid-template-columns: repeat(2, 1fr); }
      .score { grid-template-columns: 58px 1fr 38px; }
      .almanac-row { grid-template-columns: 48px 1fr; }
    }

    @media (max-width: 420px) {
      main { width: calc(100% - 18px); padding-top: max(18px, env(safe-area-inset-top)); }
      .badge { font-size: 12px; padding: 7px 10px; }
      .panel { padding: 15px; border-radius: 22px; }
      input, select { font-size: 16px; border-radius: 14px; }
      .fortune-card { padding: 14px; border-radius: 18px; }
      .pill { font-size: 12px; }
    }
  </style>
</head>
<body>
  <div class="stars"></div>
  <main>
    <section class="hero">
      <div class="badge">📜 今日运势 · 八字五行 · 黄历择日</div>
      <h1>玄灵命理</h1>

    <section class="grid">

        <input id="name" name="name" placeholder="例如：大boss" maxlength="18" required />

            <label for="birthday">生日</label>
            <input id="birthday" name="birthday" type="date" required />

        <select id="birthHour" name="birthHour">

          <option value="unknown">不知道 / 随缘起卦</option>

          <option value="22">亥时 21:00-22:59</option>
        </select>

        <label for="question">关注事项</label>
        <select id="question" name="question">
          <option>今日综合运势</option>
          <option>事业 / 项目</option>
          <option>财运 / 投资</option>
          <option>感情 / 人际</option>
          <option>健康 / 状态</option>
          <option>灵感 / 创作</option>
        </select>

        <button type="submit">生成今日命理分析</button>
        <p class="hint">说明：排盘使用 lunar-javascript 历法库计算农历、节气、干支、宜忌、神煞与方位；出生时柱按经度与均时差校正为真太阳时后取时辰。结果用于规划参考，不替代现实决策。</p>
      </form>

      <section class="panel" id="output">
        <div class="empty">
          <div>
            <span class="big">☯</span>
            <p>请填写左侧信息，生成今日命理分析与黄历宜忌。</p>
          </div>
        </div>
      </section>
    </section>

    <footer>Daily Metaphysics Reference · 仅作规划参考，不替代现实决策</footer>
  </main>

  <script src="./lunar.js"></script>
  <script>

    const output = document.querySelector('#output');

    const poems = [
      '气机渐开，宜审势而动，先稳根基，再谋推进。',

    };

    const luckyThings = ['米金色', '银灰色', '墨蓝色', '青绿色', '热茶', '清水', '木质物件', '靠窗座位', '整洁桌面', '纸质笔记'];
    const warnings = ['疲惫时不做长期承诺', '重要信息至少复核一次', '避免被催促感牵引', '以数据判断，不以情绪解释', '少用模糊表达，多给明确选项'];
    const almanacGood = ['订计划', '复盘', '沟通', '整理文档', '签小单', '学习', '清洁', '早睡', '会友', '修补漏洞', '备份资料', '轻运动'];
    const almanacBad = ['冲动消费', '熬夜硬扛', '临时改大方向', '情绪化回复', '借钱担保', '拖延交付', '争辩输赢', '盲目加仓', '口头承诺', '忽略细节'];
    const almanacGods = ['天德', '月恩', '时阳', '生气', '玉宇', '金匮', '民日', '司命'];
    const almanacBadGods = ['月破', '大耗', '五虚', '劫煞', '灾煞', '血忌', '天火', '孤辰'];
    const directions = ['正东', '东南', '正南', '西南', '正西', '西北', '正北', '东北'];

    const heavenlyStems = ['甲','乙','丙','丁','戊','己','庚','辛','壬','癸'];
    const earthlyBranches = ['子','丑','寅','卯','辰','巳','午','未','申','酉','戌','亥'];
    const stemElement = { 甲:'木', 乙:'木', 丙:'火', 丁:'火', 戊:'土', 己:'土', 庚:'金', 辛:'金', 壬:'水', 癸:'水' };
    const branchElement = { 子:'水', 丑:'土', 寅:'木', 卯:'木', 辰:'土', 巳:'火', 午:'火', 未:'土', 申:'金', 酉:'金', 戌:'土', 亥:'水' };

    function hash(str) {
      let h = 2166136261;
      for (let i = 0; i < str.length; i++) {
        h ^= str.charCodeAt(i);
        h = Math.imul(h, 16777619);
      }
      return Math.abs(h >>> 0);
    }

    function pick(arr, seed, offset = 0) {
      return arr[(seed + offset) % arr.length];
    }

    function autoZodiac(dateStr) {
      const d = new Date(dateStr + 'T00:00:00');
      const m = d.getMonth() + 1;
      const day = d.getDate();
      const signs = [
        ['摩羯座', 1, 20], ['水瓶座', 2, 19], ['双鱼座', 3, 21], ['白羊座', 4, 20],
        ['金牛座', 5, 21], ['双子座', 6, 22], ['巨蟹座', 7, 23], ['狮子座', 8, 23],

      ];
      for (const [sign, month, start] of signs) {
        if ((m === month - 1 && day >= start) || (m === month && day < start)) return sign;
      }
      return '摩羯座';
    }

    function score(seed, salt) {
      return 58 + ((seed >>> salt) % 39);
    }

    function escapeHtml(str) {
      return String(str).replace(/[&<>'"]/g, ch => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', "'":'&#39;', '"':'&quot;' }[ch]));
    }

    function ganzhi(index) {
      return heavenlyStems[((index % 10) + 10) % 10] + earthlyBranches[((index % 12) + 12) % 12];
    }

    function getSolarClass() {
      return window.Solar || (window.Lunar && window.Lunar.Solar);
    }

    function pad2(num) {
      return String(num).padStart(2, '0');
    }

    function formatDateTime(date) {
      return `${date.getFullYear()}-${pad2(date.getMonth() + 1)}-${pad2(date.getDate())} ${pad2(date.getHours())}:${pad2(date.getMinutes())}`;
    }

    function getTimeBranchLabel(date) {
      const h = date.getHours();
      if (h === 23 || h === 0) return '子时';
      return earthlyBranches[Math.ceil(h / 2) % 12] + '时';
    }

    function equationOfTimeMinutes(dayOfYear) {
      // NOAA 近似公式，单位：分钟。用于从平太阳时校正到真太阳时。
      const b = 2 * Math.PI * (dayOfYear - 81) / 364;
      return 9.87 * Math.sin(2 * b) - 7.53 * Math.cos(b) - 1.5 * Math.sin(b);
    }

    function dayOfYear(date) {
      const start = new Date(date.getFullYear(), 0, 0);
      return Math.floor((date - start) / 86400000);
    }

    function trueSolarDate(localDate, longitude, timezone) {
      const standardLongitude = Number(timezone) * 15;
      const longitudeCorrection = 4 * (Number(longitude) - standardLongitude);
      const eot = equationOfTimeMinutes(dayOfYear(localDate));
      const offsetMinutes = longitudeCorrection + eot;
      return { date: new Date(localDate.getTime() + offsetMinutes * 60000), offsetMinutes, eot, longitudeCorrection };
    }

    function buildSolar(date) {
      const SolarClass = getSolarClass();
      if (!SolarClass || !SolarClass.fromYmdHms) throw new Error('历法库未加载完成，请刷新后重试。');
      return SolarClass.fromYmdHms(date.getFullYear(), date.getMonth() + 1, date.getDate(), date.getHours(), date.getMinutes(), 0);
    }

    function countElementsFromPillars(pillars) {
      const counts = { 木:0, 火:0, 土:0, 金:0, 水:0 };
      pillars.forEach(p => {
        counts[stemElement[p[0]]] += 1;
        counts[branchElement[p[1]]] += 1;
      });
      return counts;
    }

    function summarizeCounts(counts) {
      const sorted = Object.entries(counts).sort((a, b) => b[1] - a[1]);
      return { strongest: sorted[0][0], weakest: sorted[sorted.length - 1][0], balance: Object.values(counts).filter(v => v > 0).length };
    }

    function analyzeBazi(birthday, birthMinute, birthHour, longitude, timezone, seed) {
      const [year, month, day] = birthday.split('-').map(Number);
      const [hour = 12, minute = 0] = String(birthMinute || '12:00').split(':').map(Number);
      const localDate = new Date(year, month - 1, day, hour, minute, 0);
      const trueSolar = trueSolarDate(localDate, longitude, timezone);
      let baziDate = trueSolar.date;
      let source = '真太阳时';

      if (birthHour === 'unknown') {
        baziDate = new Date(year, month - 1, day, (seed % 12) * 2, 0, 0);
        source = '未知时辰：以随机时辰兜底';
      } else if (birthHour !== 'auto') {
        baziDate = new Date(year, month - 1, day, Number(birthHour), 0, 0);
        source = '手动指定时辰';
      }

      const solar = buildSolar(baziDate);
      const lunar = solar.getLunar();
      const pillars = lunar.getBaZi();
      const counts = countElementsFromPillars(pillars);
      const summary = summarizeCounts(counts);
      return {
        pillars,
        counts,
        ...summary,
        source,
        localDate,
        trueSolarDate: trueSolar.date,
        trueSolarOffset: trueSolar.offsetMinutes,
        eot: trueSolar.eot,
        longitudeCorrection: trueSolar.longitudeCorrection,
        timeBranch: getTimeBranchLabel(baziDate),
        lunarText: lunar.toString(),
        zodiacAnimal: lunar.getYearShengXiaoExact ? lunar.getYearShengXiaoExact() : lunar.getYearShengXiao(),
        baZiWuXing: lunar.getBaZiWuXing ? lunar.getBaZiWuXing() : [],
        baZiNaYin: lunar.getBaZiNaYin ? lunar.getBaZiNaYin() : [],
        prevJieQi: lunar.getPrevJieQi && lunar.getPrevJieQi(),
        nextJieQi: lunar.getNextJieQi && lunar.getNextJieQi()
      };
    }

    function dayPillar(date) {
      return buildSolar(date).getLunar().getDayInGanZhiExact2();
    }

    function baziReading(bazi) {
      if (bazi.balance >= 5) return `五行分布相对完整，今日适合多事项协调，但每条线都应设定边界。旺在${bazi.strongest}，可借${elementTone[bazi.strongest]}；弱在${bazi.weakest}，宜主动补足${elementTone[bazi.weakest]}。`;
      return `五行偏向${bazi.strongest}，今日可顺势推进与其相关的事务；${bazi.weakest}气较弱，容易在${elementTone[bazi.weakest]}方面出现疏漏，建议以清单、复核和时间缓冲补足。`;
    }

    function hexagram(seed, question) {
      const upper = trigrams[seed % 8];
      const lower = trigrams[(seed >>> 3) % 8];
      const changing = 1 + ((seed >>> 6) % 6);
      const theme = question.includes('财') ? '守正见财' : question.includes('事业') ? '先定后动' : question.includes('感情') ? '以诚通关' : '稳中开运';
      return { upper, lower, changing, theme };
    }

    function uniquePick(arr, seed, count, offset = 0) {
      const picked = [];
      let cursor = (seed + offset) % arr.length;
      const step = 7; // 与当前候选数组长度互质，避免重复循环。
      for (let i = 0; picked.length < count && i < arr.length; i++) {
        const item = arr[cursor % arr.length];
        if (!picked.includes(item)) picked.push(item);
        cursor += step;
      }
      return picked;
    }

    function solarOfJieQi(jieQi) {
      if (!jieQi) return '无';
      const solar = jieQi.getSolar ? jieQi.getSolar() : jieQi._p?.solar;
      const name = jieQi.getName ? jieQi.getName() : jieQi._p?.name;
      if (!solar) return name || '无';
      const y = solar.getYear ? solar.getYear() : solar._p.year;
      const m = solar.getMonth ? solar.getMonth() : solar._p.month;
      const d = solar.getDay ? solar.getDay() : solar._p.day;
      const h = solar.getHour ? solar.getHour() : solar._p.hour;
      const mi = solar.getMinute ? solar.getMinute() : solar._p.minute;
      return `${name} ${y}-${pad2(m)}-${pad2(d)} ${pad2(h)}:${pad2(mi)}`;
    }

    function dailyAlmanac(date, seed, question) {
      const lunar = buildSolar(date).getLunar();
      const dayStemBranch = lunar.getDayInGanZhiExact2();
      const good = lunar.getDayYi ? lunar.getDayYi() : uniquePick(almanacGood, seed, 4, 19);
      const bad = lunar.getDayJi ? lunar.getDayJi() : uniquePick(almanacBad, seed, 4, 29);
      return {
        dateText: date.toLocaleDateString('zh-CN', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' }),
        lunarText: lunar.toString(),
        dayStemBranch,
        dayOfficer: `${lunar.getZhiXing ? lunar.getZhiXing() : ''}日｜${lunar.getDayTianShen ? lunar.getDayTianShen() : ''}${lunar.getDayTianShenType ? '·' + lunar.getDayTianShenType() : ''}${lunar.getDayTianShenLuck ? '·' + lunar.getDayTianShenLuck() : ''}`,
        good,
        bad,
        clash: `冲${lunar.getDayChongDesc ? lunar.getDayChongDesc() : lunar.getChongDesc()}｜煞${lunar.getDaySha ? lunar.getDaySha() : lunar.getSha()}`,
        directions: `喜神${lunar.getDayPositionXiDesc()}｜财神${lunar.getDayPositionCaiDesc()}｜福神${lunar.getDayPositionFuDesc()}`,
        gods: `吉神：${(lunar.getDayJiShen ? lunar.getDayJiShen() : []).join('、') || '无'}｜凶煞：${(lunar.getDayXiongSha ? lunar.getDayXiongSha() : []).join('、') || '无'}`,
        pengzu: `${lunar.getPengZuGan()}，${lunar.getPengZuZhi()}`,
        prevJieQi: solarOfJieQi(lunar.getPrevJieQi && lunar.getPrevJieQi()),
        nextJieQi: solarOfJieQi(lunar.getNextJieQi && lunar.getNextJieQi()),
        xiu: `${lunar.getXiu ? lunar.getXiu() : ''}${lunar.getXiuLuck ? '（' + lunar.getXiuLuck() + '）' : ''}`
      };
    }

    function mysticGrid(labels, values) {
      return labels.map((label, index) => `
        <div class="mystic-cell">
          <div class="label">${label}</div>
          <div class="pillar">${values[index]}</div>
        </div>
      `).join('');
    }

    form.addEventListener('submit', (event) => {
      event.preventDefault();
      const data = new FormData(form);
      const name = String(data.get('name')).trim();
      const birthday = String(data.get('birthday'));
      const question = String(data.get('question'));
      const birthHour = String(data.get('birthHour'));
      const birthMinute = String(data.get('birthMinute') || '12:00');
      const longitude = Number(data.get('longitude') || 116.4074);
      const timezone = Number(data.get('timezone') || 8);
      const today = new Date().toLocaleDateString('zh-CN');
      const zodiac = data.get('zodiac') === '自动感应' ? autoZodiac(birthday) : data.get('zodiac');
      const seed = hash(`${name}-${birthday}-${question}-${today}`);
      const safeName = escapeHtml(name);

      const overall = score(seed, 1);
      const love = score(seed, 5);
      const money = score(seed, 9);
      const work = score(seed, 13);
      const energy = score(seed, 17);
      const poem = pick(poems, seed);
      const advice = pick(adviceMap[question], seed, 3);
      const lucky = pick(luckyThings, seed, 7);
      const warning = pick(warnings, seed, 11);
      const luckyNumber = 1 + (seed % 9);
      const bazi = analyzeBazi(birthday, birthMinute, birthHour, longitude, timezone, seed);
      const gua = hexagram(seed, question);
      const almanac = dailyAlmanac(new Date(), seed, question);

      output.innerHTML = `
        <div class="result">
          <h2>${safeName} 的今日分析</h2>
          <div class="pillbox">
            <span class="pill">${zodiac}</span>
            <span class="pill">幸运数 ${luckyNumber}</span>
            <span class="pill">助运参考：${lucky}</span>
            <span class="pill">问题：${question}</span>
          </div>

          <div class="fortune-card">
            <div class="small-title">今日总论</div>
            <strong>「${poem}」</strong><br />
            今日综合指数为 <strong>${overall}</strong> 分。重点不是等待外部变化，而是选择一个确定动作，形成连续推进。
          </div>

          <div class="score-list">
            ${scoreRow('综合', overall)}
            ${scoreRow('事业', work)}
            ${scoreRow('财运', money)}
            ${scoreRow('人际', love)}
            ${scoreRow('能量', energy)}
          </div>

          <div class="fortune-card">
            <div class="small-title">真太阳时 · 精确排盘</div>
            <strong>${bazi.source}｜${bazi.timeBranch}</strong><br />
            出生地经度 ${longitude.toFixed(4)}°｜标准时区 UTC+${timezone}<br />
            标准时间：${formatDateTime(bazi.localDate)}｜真太阳时：${formatDateTime(bazi.trueSolarDate)}<br />
            经度修正 ${bazi.longitudeCorrection.toFixed(1)} 分钟｜均时差 ${bazi.eot.toFixed(1)} 分钟｜总修正 ${bazi.trueSolarOffset.toFixed(1)} 分钟
          </div>

          <div class="fortune-card">
            <div class="small-title">生辰八字 · 四柱</div>
            <div class="mystic-grid">
              ${mysticGrid(['年柱','月柱','日柱','时柱'], bazi.pillars)}
            </div>
            <div class="element-list">
              ${Object.entries(bazi.counts).map(([el, count]) => `<span class="element-tag">${el} × ${count}</span>`).join('')}
            </div>
            <strong>农历：${bazi.lunarText}｜生肖：${bazi.zodiacAnimal}</strong><br />
            纳音：${bazi.baZiNaYin.join(' / ')}<br />
            四柱五行：${bazi.baZiWuXing.join(' / ')}<br />
            节气：上一节气 ${solarOfJieQi(bazi.prevJieQi)}｜下一节气 ${solarOfJieQi(bazi.nextJieQi)}<br />
            ${baziReading(bazi)}
          </div>

          <div class="fortune-card">
            <div class="small-title">五行八卦 · 今日卦象</div>
            <strong>${gua.upper.symbol}${gua.lower.symbol} ${gua.upper.name}上${gua.lower.name}下｜${gua.theme}｜动爻 ${gua.changing}</strong><br />
            上卦属${gua.upper.element}：${gua.upper.text}<br />
            下卦属${gua.lower.element}：${gua.lower.text}
          </div>

          <div class="fortune-card">
            <div class="small-title">今日黄历 · 宜忌</div>
            <strong>${almanac.dateText}｜${almanac.dayStemBranch}日｜${almanac.dayOfficer}</strong>
            <div class="almanac-list">
              <div class="almanac-row"><b>农历</b><span>${almanac.lunarText}</span></div>
              <div class="almanac-row"><b>宜</b><span>${almanac.good.join('、')}</span></div>
              <div class="almanac-row"><b>忌</b><span>${almanac.bad.join('、')}</span></div>
              <div class="almanac-row"><b>冲煞</b><span>${almanac.clash}</span></div>
              <div class="almanac-row"><b>方位</b><span>${almanac.directions}</span></div>
              <div class="almanac-row"><b>神煞</b><span>${almanac.gods}</span></div>
              <div class="almanac-row"><b>星宿</b><span>${almanac.xiu}</span></div>
              <div class="almanac-row"><b>节气</b><span>上一：${almanac.prevJieQi}<br />下一：${almanac.nextJieQi}</span></div>
              <div class="almanac-row"><b>彭祖</b><span>${almanac.pengzu}</span></div>
            </div>
          </div>

          <div class="fortune-card">
            <div class="small-title">今日建议</div>
            ${advice}
          </div>

          <div class="fortune-card">
            <div class="small-title">避坑提醒</div>
            ${warning}。
          </div>
        </div>
      `;

      requestAnimationFrame(() => {
        document.querySelectorAll('.bar span').forEach(el => {
          el.style.width = el.dataset.value + '%';
        });
      });
    });

    function scoreRow(label, value) {
      return `
        <div class="score">
          <span>${label}</span>
          <div class="bar"><span data-value="${value}"></span></div>
          <b>${value}</b>
        </div>
      `;
    }
  </script>
</body>
</html>

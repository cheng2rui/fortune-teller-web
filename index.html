<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>四柱排盘 · 真太阳时与通书黄历</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f1e8;
      --paper: #fffdf8;
      --paper-2: #fbf6ec;
      --ink: #241d17;
      --muted: #756a5d;
      --line: #ded0bd;
      --line-strong: #c2aa8a;
      --red: #9f2f2f;
      --red-dark: #762424;
      --gold: #a77938;
      --green: #597a4a;
      --shadow: 0 18px 50px rgba(79, 54, 28, .10);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    }

    * { box-sizing: border-box; }
    html { -webkit-text-size-adjust: 100%; background: var(--bg); }
    body {
      margin: 0;
      color: var(--ink);
      background:
        linear-gradient(90deg, rgba(159,47,47,.045) 1px, transparent 1px) 0 0 / 28px 28px,
        linear-gradient(rgba(159,47,47,.035) 1px, transparent 1px) 0 0 / 28px 28px,
        radial-gradient(circle at 20% -10%, rgba(167,121,56,.13), transparent 32%),
        var(--bg);
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    .wrap {
      width: min(1120px, calc(100% - 28px));
      margin: 0 auto;
      padding: max(22px, env(safe-area-inset-top)) 0 max(34px, env(safe-area-inset-bottom));
    }

    header {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 16px;
      align-items: end;
      padding: 12px 0 20px;
      border-bottom: 2px solid var(--line-strong);
      margin-bottom: 18px;
    }

    .eyebrow { color: var(--red); font-weight: 700; letter-spacing: .16em; font-size: 12px; }
    h1 { margin: 5px 0 0; font-size: clamp(28px, 5.8vw, 48px); letter-spacing: -.04em; line-height: 1.05; }
    .intro { margin: 8px 0 0; color: var(--muted); line-height: 1.7; max-width: 760px; font-size: 14px; }
    .stamp {
      width: 70px;
      height: 70px;
      border: 3px solid var(--red);
      color: var(--red);
      display: grid;
      place-items: center;
      font-weight: 900;
      line-height: 1.1;
      text-align: center;
      transform: rotate(-6deg);
      background: rgba(255,255,255,.45);
    }

    .layout { display: grid; grid-template-columns: 370px 1fr; gap: 18px; align-items: start; }
    .card {
      background: linear-gradient(180deg, var(--paper), var(--paper-2));
      border: 1px solid var(--line);
      border-radius: 18px;
      box-shadow: var(--shadow);
    }
    .form-card { padding: 18px; position: sticky; top: 14px; }
    .section-title {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 0 0 14px;
      font-size: 16px;
      font-weight: 800;
    }
    .section-title::before { content: ""; width: 5px; height: 18px; border-radius: 99px; background: var(--red); }

    label { display: block; margin: 13px 0 7px; color: #3b3127; font-size: 14px; font-weight: 700; }
    input, select {
      width: 100%; min-height: 48px; border: 1px solid var(--line); border-radius: 12px;
      padding: 12px 13px; color: var(--ink); background: #fffaf2; outline: none; font-size: 16px;
      appearance: none; -webkit-appearance: none;
    }
    input:focus, select:focus { border-color: var(--red); box-shadow: 0 0 0 3px rgba(159,47,47,.10); }
    select {
      background-image: linear-gradient(45deg, transparent 50%, var(--red) 50%), linear-gradient(135deg, var(--red) 50%, transparent 50%);
      background-position: calc(100% - 21px) 21px, calc(100% - 15px) 21px;
      background-size: 6px 6px; background-repeat: no-repeat; padding-right: 40px;
    }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    button {
      width: 100%; min-height: 52px; margin-top: 17px; border: 0; border-radius: 12px;
      color: #fff; background: linear-gradient(135deg, var(--red), var(--red-dark));
      font-size: 16px; font-weight: 800; letter-spacing: .04em; cursor: pointer;
      box-shadow: 0 12px 26px rgba(118,36,36,.18);
    }
    button:active { transform: translateY(1px); }
    .note { margin: 12px 0 0; color: var(--muted); line-height: 1.7; font-size: 12px; }

    .output { min-height: 560px; overflow: hidden; }
    .empty { min-height: 560px; display: grid; place-items: center; padding: 34px; text-align: center; color: var(--muted); }
    .empty b { display: block; color: var(--ink); font-size: 20px; margin-bottom: 8px; }

    .report-head { padding: 20px 22px; border-bottom: 1px solid var(--line); background: rgba(159,47,47,.045); }
    .report-head h2 { margin: 0; font-size: clamp(22px, 4vw, 32px); }
    .meta { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; }
    .tag { border: 1px solid var(--line-strong); background: rgba(255,255,255,.55); border-radius: 999px; padding: 6px 10px; color: #4a3e32; font-size: 12px; }

    .report-body { padding: 18px; display: grid; gap: 14px; }
    .block { border: 1px solid var(--line); border-radius: 16px; background: rgba(255,255,255,.58); overflow: hidden; }
    .block h3 { margin: 0; padding: 12px 14px; color: var(--red-dark); background: rgba(167,121,56,.08); border-bottom: 1px solid var(--line); font-size: 15px; }
    .block-content { padding: 14px; line-height: 1.85; color: #342b23; }

    .pillar-table, .almanac-table { width: 100%; border-collapse: collapse; table-layout: fixed; }
    .pillar-table th, .pillar-table td, .almanac-table th, .almanac-table td { border: 1px solid var(--line); padding: 10px 8px; vertical-align: top; }
    .pillar-table th, .almanac-table th { background: #f3eadc; color: var(--muted); font-size: 12px; font-weight: 700; }
    .pillar { font-size: 24px; color: var(--red-dark); font-weight: 900; letter-spacing: .08em; }
    .sub { color: var(--muted); font-size: 12px; margin-top: 3px; }

    .element-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin-top: 10px; }
    .element { border: 1px solid var(--line); border-radius: 12px; padding: 10px; text-align: center; background: #fffaf2; }
    .element b { display: block; color: var(--red-dark); font-size: 20px; }
    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .list { margin: 0; padding-left: 1.2em; }
    .list li { margin: 4px 0; }
    .good { color: var(--green); font-weight: 700; }
    .bad { color: var(--red-dark); font-weight: 700; }
    footer { margin-top: 18px; color: var(--muted); font-size: 12px; text-align: center; line-height: 1.7; }

    @media (max-width: 860px) {
      .wrap { width: min(100% - 20px, 620px); padding-top: max(14px, env(safe-area-inset-top)); }
      header { grid-template-columns: 1fr; gap: 10px; }
      .stamp { width: 56px; height: 56px; font-size: 13px; justify-self: start; }
      .layout { grid-template-columns: 1fr; }
      .form-card { position: static; }
      .empty { min-height: 260px; }
      .output { min-height: 260px; }
      .two-col { grid-template-columns: 1fr; }
    }
    @media (max-width: 460px) {
      .wrap { width: calc(100% - 14px); }
      .row { grid-template-columns: 1fr; gap: 0; }
      .card { border-radius: 14px; }
      .form-card, .report-body { padding: 14px; }
      .report-head { padding: 17px 15px; }
      .pillar { font-size: 20px; }
      .pillar-table th, .pillar-table td, .almanac-table th, .almanac-table td { padding: 8px 6px; }
      .element-grid { grid-template-columns: repeat(5, minmax(0, 1fr)); gap: 6px; }
      .element { padding: 8px 4px; }
      .element b { font-size: 17px; }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <header>
      <div>
        <div class="eyebrow">BAZI · SOLAR TERM · ALMANAC</div>
        <h1>四柱排盘与黄历日课</h1>
        <p class="intro">参考开源八字排盘工具的呈现方式：先给出生信息、真太阳时校正、四柱与五行，再列今日黄历和事项建议。页面只做结构化排盘与传统文化参考，不使用“玄学包装式”文案。</p>
      </div>
      <div class="stamp">通书<br>参考</div>
    </header>

    <section class="layout">
      <form class="card form-card" id="fortuneForm">
        <p class="section-title">排盘参数</p>
        <label for="name">姓名 / 称呼</label>
        <input id="name" name="name" placeholder="例如：大boss" maxlength="18" required />

        <div class="row">
          <div>
            <label for="birthday">公历生日</label>
            <input id="birthday" name="birthday" type="date" required />
          </div>
          <div>
            <label for="birthMinute">出生时间</label>
            <input id="birthMinute" name="birthMinute" type="time" value="12:00" />
          </div>
        </div>

        <div class="row">
          <div>
            <label for="longitude">出生地经度</label>
            <input id="longitude" name="longitude" type="number" min="73" max="135" step="0.0001" value="116.4074" placeholder="北京 116.4074" />
          </div>
          <div>
            <label for="timezone">时区</label>
            <select id="timezone" name="timezone">
              <option value="8">UTC+8 中国标准时间</option>
              <option value="7">UTC+7</option>
              <option value="9">UTC+9</option>
            </select>
          </div>
        </div>

        <label for="birthHour">时柱取法</label>
        <select id="birthHour" name="birthHour">
          <option value="auto">按真太阳时自动判定</option>
          <option value="unknown">时辰未知</option>
          <option value="0">子时 23:00-00:59</option>
          <option value="2">丑时 01:00-02:59</option>
          <option value="4">寅时 03:00-04:59</option>
          <option value="6">卯时 05:00-06:59</option>
          <option value="8">辰时 07:00-08:59</option>
          <option value="10">巳时 09:00-10:59</option>
          <option value="12">午时 11:00-12:59</option>
          <option value="14">未时 13:00-14:59</option>
          <option value="16">申时 15:00-16:59</option>
          <option value="18">酉时 17:00-18:59</option>
          <option value="20">戌时 19:00-20:59</option>
          <option value="22">亥时 21:00-22:59</option>
        </select>

        <label for="question">关注事项</label>
        <select id="question" name="question">
          <option>今日综合</option>
          <option>事业 / 项目</option>
          <option>财务 / 投资</option>
          <option>感情 / 人际</option>
          <option>健康 / 状态</option>
          <option>学习 / 创作</option>
        </select>

        <button type="submit">生成排盘</button>
        <p class="note">算法说明：农历、节气、四柱、宜忌、冲煞与方位由 lunar-javascript 计算；真太阳时采用经度修正 + NOAA 均时差近似。结果仅作传统文化与日程规划参考。</p>
      </form>

      <section class="card output" id="output">
        <div class="empty">
          <div>
            <b>等待排盘</b>
            填写出生日期、时间与经度后，生成四柱、五行、节气和今日黄历。
          </div>
        </div>
      </section>
    </section>

    <footer>本页为静态前端工具；不上传个人信息，不构成医学、投资、法律或人生重大决策建议。</footer>
  </main>

  <script src="./lunar.js"></script>
  <script>
    const form = document.querySelector('#fortuneForm');
    const output = document.querySelector('#output');

    const heavenlyStems = ['甲','乙','丙','丁','戊','己','庚','辛','壬','癸'];
    const earthlyBranches = ['子','丑','寅','卯','辰','巳','午','未','申','酉','戌','亥'];
    const stemElement = { 甲:'木', 乙:'木', 丙:'火', 丁:'火', 戊:'土', 己:'土', 庚:'金', 辛:'金', 壬:'水', 癸:'水' };
    const branchElement = { 子:'水', 丑:'土', 寅:'木', 卯:'木', 辰:'土', 巳:'火', 午:'火', 未:'土', 申:'金', 酉:'金', 戌:'土', 亥:'水' };
    const elementNotes = {
      木: '条理、计划、学习与生发', 火: '表达、曝光、热度与反应', 土: '承载、执行、稳定与收束', 金: '规则、效率、判断与边界', 水: '流动、信息、适应与复盘'
    };
    const adviceMap = {
      '今日综合': ['先处理可闭环事项，再进入复杂议题。', '把重要事项写成清单，减少临场判断。'],
      '事业 / 项目': ['适合验收、复盘、补文档、定边界。', '若要推进新动作，先明确负责人和验收口径。'],
      '财务 / 投资': ['重在风控和现金流，避免因短线波动加大杠杆。', '不清楚成本、期限和退出条件时，不宜仓促决定。'],
      '感情 / 人际': ['先确认事实，再表达感受；少用暗示，多说具体需求。', '适合修复误会、同步预期，不宜争一时输赢。'],
      '健康 / 状态': ['保持作息、饮水和轻运动；高强度任务拆段处理。', '疲劳时减少长期承诺，先恢复判断力。'],
      '学习 / 创作': ['先做可验证初稿，再根据反馈修正。', '适合整理旧材料、建立模板和复用结构。']
    };

    function hash(str) {
      let h = 2166136261;
      for (let i = 0; i < str.length; i++) { h ^= str.charCodeAt(i); h = Math.imul(h, 16777619); }
      return Math.abs(h >>> 0);
    }
    function escapeHtml(str) { return String(str).replace(/[&<>'"]/g, ch => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', "'":'&#39;', '"':'&quot;' }[ch])); }
    function pad2(num) { return String(num).padStart(2, '0'); }
    function formatDateTime(date) { return `${date.getFullYear()}-${pad2(date.getMonth()+1)}-${pad2(date.getDate())} ${pad2(date.getHours())}:${pad2(date.getMinutes())}`; }
    function getSolarClass() { return window.Solar || (window.Lunar && window.Lunar.Solar); }
    function buildSolar(date) {
      const SolarClass = getSolarClass();
      if (!SolarClass || !SolarClass.fromYmdHms) throw new Error('历法库未加载完成，请刷新后重试。');
      return SolarClass.fromYmdHms(date.getFullYear(), date.getMonth()+1, date.getDate(), date.getHours(), date.getMinutes(), 0);
    }
    function dayOfYear(date) { return Math.floor((date - new Date(date.getFullYear(), 0, 0)) / 86400000); }
    function equationOfTimeMinutes(day) {
      const b = 2 * Math.PI * (day - 81) / 364;
      return 9.87 * Math.sin(2*b) - 7.53 * Math.cos(b) - 1.5 * Math.sin(b);
    }
    function trueSolarDate(localDate, longitude, timezone) {
      const standardLongitude = Number(timezone) * 15;
      const longitudeCorrection = 4 * (Number(longitude) - standardLongitude);
      const eot = equationOfTimeMinutes(dayOfYear(localDate));
      const offsetMinutes = longitudeCorrection + eot;
      return { date: new Date(localDate.getTime() + offsetMinutes * 60000), offsetMinutes, eot, longitudeCorrection };
    }
    function getTimeBranchLabel(date) {
      const h = date.getHours();
      if (h === 23 || h === 0) return '子时';
      return earthlyBranches[Math.ceil(h / 2) % 12] + '时';
    }
    function countElementsFromPillars(pillars) {
      const counts = { 木:0, 火:0, 土:0, 金:0, 水:0 };
      pillars.forEach(p => { counts[stemElement[p[0]]] += 1; counts[branchElement[p[1]]] += 1; });
      return counts;
    }
    function summarizeCounts(counts) {
      const sorted = Object.entries(counts).sort((a,b) => b[1] - a[1]);
      return { strongest: sorted[0][0], weakest: sorted[sorted.length - 1][0], balance: Object.values(counts).filter(v => v > 0).length };
    }
    function solarOfJieQi(jieQi) {
      if (!jieQi) return '无';
      const solar = jieQi.getSolar ? jieQi.getSolar() : jieQi._p?.solar;
      const name = jieQi.getName ? jieQi.getName() : jieQi._p?.name;
      if (!solar) return name || '无';
      const y = solar.getYear ? solar.getYear() : solar._p.year;
      const m = solar.getMonth ? solar.getMonth() : solar._p.month;
      const d = solar.getDay ? solar.getDay() : solar._p.day;
      const h = solar.getHour ? solar.getHour() : solar._p.hour;
      const mi = solar.getMinute ? solar.getMinute() : solar._p.minute;
      return `${name} ${y}-${pad2(m)}-${pad2(d)} ${pad2(h)}:${pad2(mi)}`;
    }
    function analyzeBazi(birthday, birthMinute, birthHour, longitude, timezone, seed) {
      const [year, month, day] = birthday.split('-').map(Number);
      const [hour = 12, minute = 0] = String(birthMinute || '12:00').split(':').map(Number);
      const localDate = new Date(year, month - 1, day, hour, minute, 0);
      const trueSolar = trueSolarDate(localDate, longitude, timezone);
      let baziDate = trueSolar.date;
      let source = '真太阳时自动校正';
      if (birthHour === 'unknown') { baziDate = new Date(year, month - 1, day, (seed % 12) * 2, 0, 0); source = '时辰未知：仅作近似参考'; }
      else if (birthHour !== 'auto') { baziDate = new Date(year, month - 1, day, Number(birthHour), 0, 0); source = '手动指定时辰'; }
      const solar = buildSolar(baziDate);
      const lunar = solar.getLunar();
      const pillars = lunar.getBaZi();
      const counts = countElementsFromPillars(pillars);
      return {
        pillars, counts, ...summarizeCounts(counts), source, localDate,
        trueSolarDate: trueSolar.date, trueSolarOffset: trueSolar.offsetMinutes,
        eot: trueSolar.eot, longitudeCorrection: trueSolar.longitudeCorrection,
        timeBranch: getTimeBranchLabel(baziDate), lunarText: lunar.toString(),
        zodiacAnimal: lunar.getYearShengXiaoExact ? lunar.getYearShengXiaoExact() : lunar.getYearShengXiao(),
        baZiWuXing: lunar.getBaZiWuXing ? lunar.getBaZiWuXing() : [],
        baZiNaYin: lunar.getBaZiNaYin ? lunar.getBaZiNaYin() : [],
        prevJieQi: lunar.getPrevJieQi && lunar.getPrevJieQi(),
        nextJieQi: lunar.getNextJieQi && lunar.getNextJieQi()
      };
    }
    function dailyAlmanac(date) {
      const lunar = buildSolar(date).getLunar();
      const good = lunar.getDayYi ? lunar.getDayYi() : [];
      const bad = lunar.getDayJi ? lunar.getDayJi() : [];
      return {
        dateText: date.toLocaleDateString('zh-CN', { year:'numeric', month:'long', day:'numeric', weekday:'long' }),
        lunarText: lunar.toString(),
        dayStemBranch: lunar.getDayInGanZhiExact2(),
        dayOfficer: `${lunar.getZhiXing ? lunar.getZhiXing() : ''}日｜${lunar.getDayTianShen ? lunar.getDayTianShen() : ''}${lunar.getDayTianShenType ? '·' + lunar.getDayTianShenType() : ''}${lunar.getDayTianShenLuck ? '·' + lunar.getDayTianShenLuck() : ''}`,
        good, bad,
        clash: `冲${lunar.getDayChongDesc ? lunar.getDayChongDesc() : lunar.getChongDesc()}｜煞${lunar.getDaySha ? lunar.getDaySha() : lunar.getSha()}`,
        directions: `喜神${lunar.getDayPositionXiDesc()}｜财神${lunar.getDayPositionCaiDesc()}｜福神${lunar.getDayPositionFuDesc()}`,
        gods: `吉神：${(lunar.getDayJiShen ? lunar.getDayJiShen() : []).join('、') || '无'}｜凶煞：${(lunar.getDayXiongSha ? lunar.getDayXiongSha() : []).join('、') || '无'}`,
        pengzu: `${lunar.getPengZuGan()}，${lunar.getPengZuZhi()}`,
        xiu: `${lunar.getXiu ? lunar.getXiu() : ''}${lunar.getXiuLuck ? '（' + lunar.getXiuLuck() + '）' : ''}`,
        prevJieQi: solarOfJieQi(lunar.getPrevJieQi && lunar.getPrevJieQi()),
        nextJieQi: solarOfJieQi(lunar.getNextJieQi && lunar.getNextJieQi())
      };
    }
    function baziReading(bazi) {
      if (bazi.balance >= 5) return `五行覆盖完整，日常事务可多线协调；较旺为${bazi.strongest}，对应${elementNotes[bazi.strongest]}，较弱为${bazi.weakest}，宜用清单、复核或节奏管理补足。`;
      return `五行偏向${bazi.strongest}，处理相关事务较顺；${bazi.weakest}不足处容易形成疏漏，今日不宜凭感觉快速拍板。`;
    }
    function elementGrid(counts) {
      return Object.entries(counts).map(([el, count]) => `<div class="element"><span>${el}</span><b>${count}</b><small>${elementNotes[el].split('、')[0]}</small></div>`).join('');
    }
    function pillarTable(bazi) {
      const labels = ['年柱','月柱','日柱','时柱'];
      return `<table class="pillar-table"><thead><tr>${labels.map(l => `<th>${l}</th>`).join('')}</tr></thead><tbody><tr>${bazi.pillars.map((p, i) => `<td><div class="pillar">${p}</div><div class="sub">${bazi.baZiWuXing[i] || ''}<br>${bazi.baZiNaYin[i] || ''}</div></td>`).join('')}</tr></tbody></table>`;
    }
    function almanacTable(a) {
      return `<table class="almanac-table"><tbody>
        <tr><th>日期</th><td>${a.dateText}｜${a.dayStemBranch}日｜${a.dayOfficer}</td></tr>
        <tr><th>农历</th><td>${a.lunarText}</td></tr>
        <tr><th class="good">宜</th><td>${a.good.join('、') || '无'}</td></tr>
        <tr><th class="bad">忌</th><td>${a.bad.join('、') || '无'}</td></tr>
        <tr><th>冲煞</th><td>${a.clash}</td></tr>
        <tr><th>方位</th><td>${a.directions}</td></tr>
        <tr><th>神煞</th><td>${a.gods}</td></tr>
        <tr><th>星宿</th><td>${a.xiu || '无'}</td></tr>
        <tr><th>节气</th><td>上一：${a.prevJieQi}<br>下一：${a.nextJieQi}</td></tr>
        <tr><th>彭祖</th><td>${a.pengzu}</td></tr>
      </tbody></table>`;
    }

    form.addEventListener('submit', (event) => {
      event.preventDefault();
      try {
        const data = new FormData(form);
        const name = String(data.get('name')).trim();
        const birthday = String(data.get('birthday'));
        const question = String(data.get('question'));
        const birthHour = String(data.get('birthHour'));
        const birthMinute = String(data.get('birthMinute') || '12:00');
        const longitude = Number(data.get('longitude') || 116.4074);
        const timezone = Number(data.get('timezone') || 8);
        const seed = hash(`${name}-${birthday}-${question}`);
        const bazi = analyzeBazi(birthday, birthMinute, birthHour, longitude, timezone, seed);
        const almanac = dailyAlmanac(new Date());
        const advice = adviceMap[question] || adviceMap['今日综合'];
        const safeName = escapeHtml(name);

        output.innerHTML = `
          <article>
            <div class="report-head">
              <h2>${safeName}｜四柱排盘</h2>
              <div class="meta">
                <span class="tag">${bazi.source}</span>
                <span class="tag">${bazi.timeBranch}</span>
                <span class="tag">生肖：${bazi.zodiacAnimal}</span>
                <span class="tag">关注：${question}</span>
              </div>
            </div>
            <div class="report-body">
              <section class="block"><h3>一、真太阳时校正</h3><div class="block-content">
                标准时间：${formatDateTime(bazi.localDate)}<br>
                真太阳时：${formatDateTime(bazi.trueSolarDate)}<br>
                出生地经度 ${longitude.toFixed(4)}°｜标准时区 UTC+${timezone}<br>
                经度修正 ${bazi.longitudeCorrection.toFixed(1)} 分钟｜均时差 ${bazi.eot.toFixed(1)} 分钟｜合计 ${bazi.trueSolarOffset.toFixed(1)} 分钟
              </div></section>

              <section class="block"><h3>二、生辰八字</h3><div class="block-content">
                ${pillarTable(bazi)}
                <p>农历：${bazi.lunarText}</p>
                <p>节气：上一节气 ${solarOfJieQi(bazi.prevJieQi)}｜下一节气 ${solarOfJieQi(bazi.nextJieQi)}</p>
              </div></section>

              <section class="block"><h3>三、五行分布</h3><div class="block-content">
                <div class="element-grid">${elementGrid(bazi.counts)}</div>
                <p>${baziReading(bazi)}</p>
              </div></section>

              <section class="block"><h3>四、今日黄历</h3><div class="block-content">${almanacTable(almanac)}</div></section>

              <section class="block"><h3>五、事项建议</h3><div class="block-content two-col">
                <div><b>宜采用</b><ul class="list"><li>${advice[0]}</li><li>优先选择黄历“宜”中与当前事项接近的动作。</li></ul></div>
                <div><b>宜规避</b><ul class="list"><li>${advice[1]}</li><li>若事项落在黄历“忌”类，建议降低风险敞口或延后关键动作。</li></ul></div>
              </div></section>
            </div>
          </article>`;
      } catch (err) {
        output.innerHTML = `<div class="empty"><div><b>排盘失败</b>${escapeHtml(err.message || err)}</div></div>`;
      }
    });
  </script>
</body>
</html>
